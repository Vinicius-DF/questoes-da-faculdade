<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Questões de Estudo Offline</title>
    
    <!-- Configurações para PWA, iOS e Android -->
    <meta name="theme-color" content="#1C1917" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Questões Offline" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Manifesto PWA -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Registro do Service Worker para suporte Offline e Instalação -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('Service Worker registrado com sucesso! Escopo:', reg.scope);
            })
            .catch((err) => {
              console.error('Falha ao registrar o Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
